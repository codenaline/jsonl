name: Bug report
description: Report a reproducible bug in jsonl
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include a minimal Go reproduction so the behavior can be verified quickly.

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste a small Go program or test that shows the problem.
      render: go
      placeholder: |
        package main

        import (
        	"strings"

        	"github.com/codenaline/jsonl"
        )

        func main() {
        	r := jsonl.NewReader[map[string]any](strings.NewReader("{\"id\":1}\n"))
        	_ = r
        }
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: What version or commit of jsonl are you using?
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Paste the output of `go version`.
      placeholder: go version go1.22.0 linux/amd64
    validations:
      required: true

  - type: dropdown
    id: operating-systems
    attributes:
      label: Operating system
      description: Which operating systems does this happen with?
      multiple: true
      options:
        - Linux
        - macOS
        - Windows

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add any other context, input samples, or benchmark output.
    validations:
      required: false
