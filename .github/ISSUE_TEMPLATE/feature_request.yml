name: Feature request
description: Suggest a new feature or improvement for jsonl
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Describe the use case and the API shape you would expect."

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: I need to process JSON Lines records where...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What API or behavior would you like?
      placeholder: Add an option or method that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or other packages have you considered?
    validations:
      required: false
